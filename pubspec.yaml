name: thai_fabric_checkin_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  material_symbols_icons: ^4.2815.0
  geolocator: ^13.0.1 # ตรวจสอบเวอร์ชันล่าสุดใน pub.dev
  geocoding: ^3.0.0
  google_maps_flutter: ^2.10.0
  cloud_firestore: ^5.6.2
  firebase_core: ^3.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/

fonts:
  - family: Anuphan
    fonts:
      - asset: fonts/Anuphan-Bold.ttf
        weight: 700
      - asset: fonts/Anuphan-Medium.ttf
        weight: 500
      - asset: fonts/Anuphan-Regular.ttf
        weight: 400
      - asset: fonts/Anuphan-SemiBold.ttf
        weight: 600
