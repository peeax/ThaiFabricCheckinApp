name: aewmai
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  intl: ^0.20.2
  google_maps_flutter: ^2.16.0
  material_symbols_icons: ^4.2815.0
  http: ^1.2.0
  url_launcher: ^6.2.5
  flutter_dotenv: ^6.0.0
  email_validator: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
 

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/data/provinces.json
    - assets/images/logo_app.png
    - assets/images/logo_white.png
    - assets/images/logo_black.png
    - assets/images/FabricIntro_image.png
    - assets/images/default_profile.png

  fonts:
    - family: Anuphan
      fonts:
        - asset: assets/fonts/Anuphan-Bold.ttf
          weight: 700
        - asset: assets/fonts/Anuphan-Medium.ttf
          weight: 500
        - asset: assets/fonts/Anuphan-Regular.ttf
          weight: 400
        - asset: assets/fonts/Anuphan-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_app.png" 

